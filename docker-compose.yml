services:
  plantiqx-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: plantiqx-web
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
