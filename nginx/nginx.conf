server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Main static website
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # SGL React SPA - handle client-side routing
    location /sgl/ {
        try_files $uri $uri/ /sgl/index.html;
    }

    # Block WordPress scanners and common exploit probes
    location ~* /(wp-admin|wp-includes|wp-content|wp-login\.php|wordpress/wp-|xmlrpc\.php|wlwmanifest\.xml) {
        return 444;
    }

    # Serve favicon without logging 404s
    location = /favicon.ico {
        return 302 /sgl/Plantiqx-Fav.svg;
        access_log off;
        log_not_found off;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    error_page 404 /index.html;
}
